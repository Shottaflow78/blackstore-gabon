<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Comptes Roblox - Black Store</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
      background: #111; /* fond sombre */
      color: #fff;
    }

    header {
      text-align: center;
      padding: 40px;
    }

    .container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      padding: 30px;
    }

    .card {
      background-color: rgba(28,28,28,0.9);
      border-radius: 8px;
      padding: 20px;
      text-align: center;
      transition: transform 0.3s;
    }

    .card:hover {
      transform: scale(1.05);
    }

    .card img {
      width: 100%;
      border-radius: 6px;
      margin-bottom: 10px;
    }

    /* Boutons néon turquoise */
    .btn-buy, .btn-link {
      display: inline-block;
      margin-top: 10px;
      padding: 12px 20px;
      background: transparent;
      color: #00ffea;
      border: 2px solid #00ffea;
      border-radius: 6px;
      font-weight: bold;
      text-decoration: none;
      text-shadow: 0 0 8px #00ffea;
      box-shadow: 0 0 12px #00ffea;
      transition: all 0.3s ease;
    }

    .btn-buy:hover, .btn-link:hover {
      color: #fff;
      background: #00ffea;
      text-shadow: 0 0 15px #fff;
      box-shadow: 0 0 20px #00ffea, 0 0 40px #00ffea;
      transform: scale(1.1);
    }
  </style>
</head>
<body>
  <header>
    <h1>🎮 Comptes Roblox</h1>
    <p>Choisissez votre compte gaming</p>
  </header>

  <div class="container">
    <div class="card">
      <img src="images/roblox1.jpg" alt="Compte Roblox 1">
      <h2>Compte Roblox (BLOX FRUIT) #1</h2>
      <p>Niveau : 2750</p>
      <p>Robux : 80</p>
      <p>Prix : 15 000 FCFA</p>
      <a href="https://wa.me/24162081813" class="btn-buy">Acheter via WhatsApp</a>
    </div>

    <div class="card">
      <img src="images/roblox2.jpg" alt="Compte Roblox 2">
      <h2>Compte Roblox (BLOX FRUIT) #2</h2>
      <p>Niveau : 2550 (MAX)</p>
      <p>Robux : 40</p>
      <p>Prix : 10 000 FCFA</p>
      <a href="https://wa.me/241XXXXXXXX" class="btn-buy">Acheter via WhatsApp</a>
    </div>
  </div>
</body>
</html>
